name = "rush"
main = "src/index.ts"
compatibility_date = "2026-04-13"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "rush-db"
database_id = "placeholder-id"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "rush-files"

[[kv_namespaces]]
binding = "SESSIONS"
id = "placeholder-id"
